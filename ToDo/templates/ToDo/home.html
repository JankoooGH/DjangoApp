<!DOCTYPE html>
<html lang="pl">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Habitly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/e00b0940e0.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="app">

    <header class="app-header">
        <div class='logo-bar'>
            <img src="{% static 'img/logo.png' %}" alt="logo" class="logo-img">
            <h1 class="logo-name">Habitly</h1>
        </div>
        <a href="{% url 'auth' %}" class="btn login">Logowanie</a>
    </header>

    <main class="app-content">
        <div class="txt-content">
            <h1>Track your
            <br>
            <span class="text-primary">habits.</span>
            <br>
            Change your life.</h1>
        </div>
        <div class="task-bar">
            <h1 class="task-bar-head">Dzisiejsze zadania</h1>
            <ul class="add-task-item">➕ Dodaj zadanie</ul>
            <ul class="task-item">Bieganie Weekly Ukończono: 2 z 4 0 🔥<p>✓ Zakończ ❌</p></ul>
            <ul class="task-item">Czytanie Daily  4 🔥<p>Ukończono ✅ ❌</p></ul>
            <ul class="task-item">Zakupy Once <p>✓ Zakończ ❌</p></ul>
        </div>
    </main>
  </div>
</body>
</html>
